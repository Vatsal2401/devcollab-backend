name: DevCollab Backend Deployment

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}

      - name: Ensure target directory exists
        env:
          DEPLOY_HOST: ${{ secrets.GCP_VM_HOST }}
          DEPLOY_USER: ${{ secrets.GCP_VM_USER }}
        run: |
          HOST=$(echo "$DEPLOY_HOST" | tr -d '[:space:]')
          USER=$(echo "$DEPLOY_USER" | tr -d '[:space:]')
          ssh -o StrictHostKeyChecking=no \
            "${USER}@${HOST}" \
            "mkdir -p /home/${USER}/backend-infra/devcollab-backend /opt/devcollab /plans"

      - name: Copy build to VM
        env:
          DEPLOY_HOST: ${{ secrets.GCP_VM_HOST }}
          DEPLOY_USER: ${{ secrets.GCP_VM_USER }}
        run: |
          HOST=$(echo "$DEPLOY_HOST" | tr -d '[:space:]')
          USER=$(echo "$DEPLOY_USER" | tr -d '[:space:]')
          scp -o StrictHostKeyChecking=no -r \
            dist package.json package-lock.json \
            "${USER}@${HOST}:/home/${USER}/backend-infra/devcollab-backend/"

      - name: Deploy and restart
        env:
          DEPLOY_HOST: ${{ secrets.GCP_VM_HOST }}
          DEPLOY_USER: ${{ secrets.GCP_VM_USER }}
        run: |
          HOST=$(echo "$DEPLOY_HOST" | tr -d '[:space:]')
          USER=$(echo "$DEPLOY_USER" | tr -d '[:space:]')
          ssh -o StrictHostKeyChecking=no "${USER}@${HOST}" \
            "cd /home/${USER}/backend-infra/devcollab-backend && \
             npm ci --omit=dev && \
             (pm2 restart devcollab-backend || pm2 start ecosystem.config.js) && \
             pm2 save --force"

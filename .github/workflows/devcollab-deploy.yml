name: DevCollab Backend Deployment

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}

      - name: Prepare SSH variables
        run: |
          echo "DEPLOY_HOST=$(echo '${{ secrets.GCP_VM_HOST }}' | tr -d '\r\n')" >> $GITHUB_ENV
          echo "DEPLOY_USER=$(echo '${{ secrets.GCP_VM_USER }}' | tr -d '\r\n')" >> $GITHUB_ENV

      - name: Ensure target directory exists
        run: |
          ssh -o StrictHostKeyChecking=no \
            $DEPLOY_USER@$DEPLOY_HOST \
            "mkdir -p ~/backend-infra/devcollab-backend /opt/devcollab /plans"

      - name: Copy build to VM
        run: |
          scp -o StrictHostKeyChecking=no -r \
            dist package.json package-lock.json \
            $DEPLOY_USER@$DEPLOY_HOST:~/backend-infra/devcollab-backend/

      - name: Deploy and restart
        run: |
          ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_HOST \
            "cd ~/backend-infra/devcollab-backend && \
             npm ci --omit=dev && \
             (pm2 restart devcollab-backend || pm2 start ecosystem.config.js) && \
             pm2 save --force"
